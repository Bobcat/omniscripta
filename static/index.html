<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omniscripta</title>
  <meta name="description" content="Audio Transcription and Editing" />

  <!-- Cache Control for Mobile Browsers -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <!-- Material Symbols -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="style.css?v=31">
  <link rel="stylesheet" href="layout.css?v=31">
  <link rel="stylesheet" href="upload.css?v=31">
</head>

<body>
  <div class="app-container">
    <nav class="sidebar expanded" id="app-sidebar">
      <!-- Top section with Toggle -->
      <div class="sidebar-header">
        <button id="menu-toggle" class="icon-btn" title="Expand/Collapse">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>

      <div class="sidebar-content">
        <ul class="nav-links">
          <li data-action="upload" class="active" title="Upload Audio">
            <span class="material-symbols-outlined">upload</span>
            <span class="link-text">Upload audio</span>
          </li>
          <li data-action="live" title="Live recording">
            <span class="material-symbols-outlined">mic</span>
            <span class="link-text">Live recording</span>
          </li>
          <li data-action="open-local" title="Open local .srt">
            <span class="material-symbols-outlined">folder_open</span>
            <span class="link-text">Open local project</span>
          </li>
          <input type="file" id="localProjectInput" accept=".srt" hidden />
        </ul>

        <!-- Projects will be injected here by app.js -->

        <ul class="nav-links" style="margin-top: auto;">
          <li data-action="settings" title="Settings">
            <span class="material-symbols-outlined">settings</span>
            <span class="link-text">Settings</span>
          </li>
        </ul>
      </div>
    </nav>

    <main class="main-content" id="main-view">
      <!-- Dynamic Content Injected Here -->
    </main>
  </div>

  <!-- Alert modal -->
  <div aria-labelledby="alertTitle" aria-modal="true" class="modal hidden" id="alertModal" role="dialog">
    <div class="modal-card">
      <h3 id="alertTitle">Notification</h3>
      <p id="alertMessage" style="margin-top: 10px; line-height: 1.5; color: var(--muted);"></p>
      <div class="modal-actions">
        <button class="primary" id="alertOkBtn">OK</button>
      </div>
    </div>
  </div>

  <script  src="app.bundle.js?v=31"></script>
</body>

</html>
