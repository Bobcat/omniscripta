<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Omniscripta</title>
  <meta name="description" content="Audio Transcription and Editing" />

  <!-- Material Symbols -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="layout.css">
  <link rel="stylesheet" href="upload.css">
</head>

<body>
  <div class="app-container">
    <nav class="sidebar expanded" id="app-sidebar">
      <!-- Top section with Toggle -->
      <div class="sidebar-header">
        <button id="menu-toggle" class="icon-btn" title="Expand/Collapse">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>

      <div class="sidebar-content">
        <ul class="nav-links">
          <li data-action="upload" class="active" title="Upload Audio">
            <span class="material-symbols-outlined">upload</span>
            <span class="link-text">Upload audio</span>
          </li>
          <!-- Future items can be added here -->
          <li data-action="history" title="History (Coming Soon)" class="disabled">
            <span class="material-symbols-outlined">history</span>
            <span class="link-text">Activity</span>
          </li>
        </ul>
      </div>
    </nav>

    <main class="main-content" id="main-view">
      <!-- Dynamic Content Injected Here -->
    </main>
  </div>

  <script  src="app.bundle.js"></script>
</body>

</html>
