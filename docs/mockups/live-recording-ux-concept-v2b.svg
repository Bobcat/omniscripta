<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1180" viewBox="0 0 1600 1180" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1600" y2="1180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F2EFE9"/>
      <stop offset="1" stop-color="#E6E0D4"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FBFAF8"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#1B1612"/>
      <stop offset="1" stop-color="#2A221C"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#201A15" flood-opacity="0.14"/>
    </filter>
    <style>
      .t { font: 700 26px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #201A15; }
      .s { font: 500 14px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #706459; }
      .h { font: 700 18px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #241E18; }
      .b { font: 500 13px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #433A31; }
      .m { font: 500 12px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #80756B; }
      .caps { font: 700 11px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #6C5F54; letter-spacing: .06em; text-transform: uppercase; }
      .btn { font: 700 13px 'Segoe UI', 'Helvetica Neue', sans-serif; }
      .pill { font: 700 12px 'Segoe UI', 'Helvetica Neue', sans-serif; }
      .mono { font: 600 12px 'SFMono-Regular', Consolas, monospace; }
      .call { font: 600 13px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #2E271F; }
      .num { font: 700 12px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #fff; }
    </style>
  </defs>

  <rect width="1600" height="1180" fill="url(#bg2)"/>
  <text x="60" y="62" class="t">Live Recording UX Concept B (Recorder-first / transcript-forward)</text>
  <text x="60" y="88" class="s">Alternatief: minder “formulier/controls”, meer focus op opname-state + transcript leesbaarheid. Debug via overlay drawer.</text>

  <!-- Desktop shell -->
  <g transform="translate(58,128)">
    <rect x="0" y="0" width="1484" height="722" rx="30" fill="#E8E1D5" opacity="0.7"/>
    <rect x="18" y="18" width="1448" height="686" rx="26" fill="url(#panel)" filter="url(#shadow2)"/>
    <text x="46" y="58" class="h">Concept B · Recorder-first layout (Desktop)</text>
    <text x="46" y="82" class="s">Één compacte command rail linksboven, grote transcript canvas, sticky transportbalk onderin.</text>

    <!-- Left / top command rail -->
    <rect x="42" y="106" width="380" height="230" rx="20" fill="#FFF" stroke="#E3D8CA"/>
    <text x="64" y="138" class="caps">Recording</text>
    <text x="64" y="165" class="h">Meeting / interview</text>
    <text x="64" y="186" class="s">Klantgesprek • 1 speaker mode (editable before start)</text>

    <rect x="62" y="202" width="340" height="110" rx="18" fill="url(#hero)"/>
    <circle cx="98" cy="236" r="10" fill="#D84B3D"/>
    <text x="116" y="241" class="pill" fill="#F3EDE7">Listening</text>
    <text x="62" y="275" style="font: 700 34px 'Segoe UI', 'Helvetica Neue', sans-serif; fill:#FFF1E6;">00:18:42</text>
    <text x="240" y="275" style="font: 600 13px 'Segoe UI', 'Helvetica Neue', sans-serif; fill:#D6C5B4;">live transcript active</text>
    <rect x="62" y="286" width="340" height="1" fill="#52463B"/>
    <text x="62" y="306" class="m" fill="#C9B9A8">Statusregel heeft vaste hoogte buiten deze hero-card (geen layout shifts)</text>

    <!-- Session meta tiles -->
    <rect x="438" y="106" width="998" height="84" rx="18" fill="#FFF" stroke="#E4D9CB"/>
    <text x="462" y="136" class="caps">Session info (stable row)</text>
    <text x="462" y="160" class="b">Microphone: USB / Laptop mic</text>
    <text x="662" y="160" class="b">Language: English</text>
    <text x="834" y="160" class="b">Auto-scroll: On</text>
    <text x="984" y="160" class="b">Markers: 2</text>
    <rect x="1246" y="126" width="170" height="42" rx="12" fill="#F4ECE0" stroke="#D9CBB9"/>
    <text x="1290" y="152" class="btn" fill="#453B31">Session settings</text>

    <!-- Transcript canvas dominant -->
    <rect x="438" y="204" width="998" height="478" rx="20" fill="#FFF" stroke="#E4D9CB"/>
    <text x="466" y="238" class="caps">Transcript (primary surface)</text>

    <!-- Timeline gutter -->
    <rect x="458" y="252" width="76" height="408" rx="12" fill="#F6F1E8" stroke="#E6DACC"/>
    <text x="476" y="286" class="m">00:00</text>
    <text x="476" y="338" class="m">00:30</text>
    <text x="476" y="390" class="m">01:00</text>
    <text x="476" y="442" class="m">01:30</text>
    <text x="476" y="494" class="m">02:00</text>
    <text x="476" y="546" class="m">02:30</text>
    <text x="476" y="598" class="m">03:00</text>

    <!-- Final transcript body -->
    <rect x="548" y="252" width="866" height="344" rx="14" fill="#FCFBF8" stroke="#EAE1D6"/>
    <text x="572" y="286" class="b">Thanks for joining. Could you start by introducing yourself and your role at the company?</text>
    <text x="572" y="322" class="b">Sure. My name is Anna, and I lead operations for the support team. I joined in 2021...</text>
    <text x="572" y="358" class="b">Great. What changed in your workflow after the migration and handover period?</text>
    <text x="572" y="394" class="b">The biggest change was that intake became centralized. Before that, each sub-team handled...</text>
    <text x="572" y="430" class="b">We also started using a shared dashboard for weekly follow-up and escalation tracking.</text>
    <text x="572" y="466" class="b">That helped us spot bottlenecks earlier, especially during the first six weeks after go-live.</text>
    <text x="572" y="502" class="b">Can you give an example of a bottleneck you identified using that dashboard?</text>
    <text x="572" y="538" class="b">Yes, ticket triage was delayed because ownership was unclear between teams...</text>

    <!-- Partial / active line docked bottom -->
    <rect x="548" y="610" width="866" height="50" rx="14" fill="#FFF6E7" stroke="#EAD8B3"/>
    <text x="568" y="632" class="caps">Active phrase</text>
    <text x="568" y="650" class="b">"...and that was when we decided to assign a rotating triage owner"</text>

    <!-- Sticky transport bar desktop -->
    <rect x="42" y="352" width="380" height="330" rx="20" fill="#FFF" stroke="#E3D8CA"/>
    <text x="64" y="384" class="caps">Controls</text>
    <rect x="62" y="398" width="340" height="64" rx="18" fill="#B43A2E"/>
    <text x="187" y="437" class="btn" fill="#FFF">Finish recording</text>

    <rect x="62" y="474" width="108" height="44" rx="12" fill="#F4ECE0" stroke="#D8CBB8"/>
    <text x="101" y="501" class="btn" fill="#40362D">Pause</text>
    <rect x="178" y="474" width="108" height="44" rx="12" fill="#F4ECE0" stroke="#D8CBB8"/>
    <text x="216" y="501" class="btn" fill="#40362D">Marker</text>
    <rect x="294" y="474" width="108" height="44" rx="12" fill="#F4ECE0" stroke="#D8CBB8"/>
    <text x="332" y="501" class="btn" fill="#40362D">Notes</text>

    <rect x="62" y="530" width="340" height="72" rx="14" fill="#FBF8F3" stroke="#E8DDCF"/>
    <text x="82" y="556" class="caps">After stop</text>
    <rect x="82" y="568" width="140" height="24" rx="10" fill="#EFE3D1"/>
    <text x="107" y="584" class="m">Open in editor</text>
    <rect x="230" y="568" width="94" height="24" rx="10" fill="#EFE3D1"/>
    <text x="260" y="584" class="m">Export SRT</text>

    <rect x="62" y="614" width="340" height="48" rx="14" fill="#FFF" stroke="#D7CBBC" stroke-dasharray="4 4"/>
    <text x="82" y="643" class="b">Developer tools</text>
    <rect x="318" y="626" width="64" height="22" rx="11" fill="#EFE4D4"/>
    <text x="338" y="641" class="m">Show</text>
  </g>

  <!-- Debug overlay variant -->
  <g transform="translate(930,214)">
    <rect x="0" y="0" width="590" height="460" rx="20" fill="#12100E" opacity="0.92" filter="url(#shadow2)"/>
    <text x="24" y="38" style="font:700 17px 'Segoe UI'; fill:#F3ECE4;">Developer tools overlay (optional)</text>
    <text x="24" y="58" style="font:500 12px 'Segoe UI'; fill:#B8AA99;">Overlays transcript partially, but only in explicit debug mode.</text>
    <rect x="24" y="76" width="542" height="54" rx="12" fill="#1E1A17" stroke="#35302A"/>
    <text x="42" y="108" class="mono" fill="#E0D4C6">Mode: whisperlive_sidecar  •  ws: connected  •  ready: 1  •  p/f: 4/2</text>
    <rect x="24" y="140" width="542" height="262" rx="12" fill="#0E0C0A" stroke="#2D2823"/>
    <text x="42" y="167" class="mono" fill="#D9CEC0">[12:44:18] ready</text>
    <text x="42" y="191" class="mono" fill="#D9CEC0">[12:44:19] control_ack start</text>
    <text x="42" y="215" class="mono" fill="#D9CEC0">[12:44:20] partial rev=12 tail=...</text>
    <text x="42" y="239" class="mono" fill="#D9CEC0">[12:44:21] final seg=s00012</text>
    <text x="42" y="263" class="mono" fill="#D9CEC0">[12:44:22] stats rtf=0.42 decode=18ms</text>
    <text x="42" y="287" class="mono" fill="#D9CEC0">[12:44:23] partial rev=14 tail=...</text>
    <text x="42" y="321" class="m" fill="#A79888">Compact log + raw stats; geen primaire UX-component.</text>
    <rect x="24" y="414" width="108" height="28" rx="12" fill="#2B2621" stroke="#403930"/>
    <text x="57" y="432" class="m" fill="#E7DBCD">Ping</text>
    <rect x="142" y="414" width="138" height="28" rx="12" fill="#2B2621" stroke="#403930"/>
    <text x="173" y="432" class="m" fill="#E7DBCD">Reconnect</text>
    <rect x="290" y="414" width="128" height="28" rx="12" fill="#2B2621" stroke="#403930"/>
    <text x="321" y="432" class="m" fill="#E7DBCD">Copy logs</text>
    <rect x="428" y="414" width="138" height="28" rx="12" fill="#B43A2E"/>
    <text x="470" y="432" class="pill" fill="#FFF">Close debug</text>
  </g>

  <!-- Mobile concept B -->
  <g transform="translate(70,874)">
    <text x="0" y="0" class="h">Concept B · Mobile (single-thumb transport bar + transcript canvas)</text>
    <text x="0" y="22" class="s">Meer “voice recorder” vibe: grote timerheader, transcript kaart, compacte sticky transport bar. Debug = bottom sheet.</text>
  </g>
  <g transform="translate(820,848)">
    <rect x="0" y="0" width="300" height="290" rx="34" fill="#161311"/>
    <rect x="10" y="10" width="280" height="270" rx="26" fill="#FBFAF8"/>
    <rect x="116" y="18" width="68" height="5" rx="3" fill="#D5CDC2"/>
    <text x="26" y="46" class="h">Live recording</text>
    <rect x="22" y="56" width="236" height="56" rx="14" fill="url(#hero)"/>
    <circle cx="46" cy="84" r="7" fill="#D84B3D"/>
    <text x="59" y="88" class="pill" fill="#F3EDE7">Listening</text>
    <text x="22" y="106" style="font:700 22px 'Segoe UI'; fill:#FFF1E6;">00:18:42</text>
    <rect x="22" y="120" width="236" height="94" rx="12" fill="#FFF" stroke="#E4DACA"/>
    <text x="34" y="142" class="caps">Transcript</text>
    <text x="34" y="165" class="b">[00:00] Thanks for joining...</text>
    <text x="34" y="189" class="b">[00:11] Sure, my name is...</text>
    <text x="34" y="206" class="m">Partial pinned below when active</text>
    <rect x="22" y="223" width="236" height="18" rx="9" fill="#FFF6E7" stroke="#EAD8B3"/>
    <text x="34" y="236" class="m">...what changed in your workflow</text>
    <rect x="16" y="246" width="248" height="28" rx="14" fill="#EFE5D8" stroke="#D6C8B6"/>
    <circle cx="34" cy="260" r="7" fill="#B43A2E"/>
    <rect x="54" y="251" width="56" height="18" rx="9" fill="#FFF" stroke="#D7C9B6"/>
    <text x="72" y="264" class="m">Pause</text>
    <rect x="116" y="251" width="48" height="18" rx="9" fill="#FFF" stroke="#D7C9B6"/>
    <text x="132" y="264" class="m">Mark</text>
    <rect x="170" y="249" width="84" height="22" rx="11" fill="#1F1A15"/>
    <text x="197" y="264" class="pill" fill="#FFF">Finish</text>
  </g>

  <!-- B callouts -->
  <g>
    <circle cx="60" cy="924" r="14" fill="#1F1A15"/><text x="55" y="929" class="num">1</text>
    <text x="84" y="929" class="call">Grotere timer/state hero maakt opname-state in één oogopslag duidelijker (meer recorder-app gevoel).</text>
    <circle cx="60" cy="960" r="14" fill="#1F1A15"/><text x="55" y="965" class="num">2</text>
    <text x="84" y="965" class="call">Session-info in één stabiele meta-rij (mic/language/autoscroll/markers) voorkomt verticale beweging links.</text>
    <circle cx="60" cy="996" r="14" fill="#1F1A15"/><text x="55" y="1001" class="num">3</text>
    <text x="84" y="1001" class="call">Transportcontrols staan gegroepeerd los van transcript (sticky/constante positie) en blijven altijd bereikbaar.</text>
    <circle cx="60" cy="1032" r="14" fill="#1F1A15"/><text x="55" y="1037" class="num">4</text>
    <text x="84" y="1037" class="call">Developer tools als overlay/drawer i.p.v. vaste eventlog: minder visuele ruis in het primaire opname-scherm.</text>
    <circle cx="60" cy="1068" r="14" fill="#1F1A15"/><text x="55" y="1073" class="num">5</text>
    <text x="84" y="1073" class="call">Geschikt voor interviews/meetings: transcript leesruimte maximaal, markers/notes blijven snel toegankelijk.</text>
  </g>
</svg>
