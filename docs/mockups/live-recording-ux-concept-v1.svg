<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1180" viewBox="0 0 1600 1180" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F2EA"/>
      <stop offset="1" stop-color="#EDE6DA"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FBFAF7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#312A20" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 26px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #1F1A15; }
      .subtitle { font: 500 14px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #6E6257; }
      .h2 { font: 700 18px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #241E18; }
      .body { font: 500 13px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #433A31; }
      .muted { font: 500 12px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #7E746A; }
      .small { font: 600 11px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #6B5E52; letter-spacing: .04em; text-transform: uppercase; }
      .pill { font: 700 12px 'Segoe UI', 'Helvetica Neue', sans-serif; }
      .btn { font: 700 13px 'Segoe UI', 'Helvetica Neue', sans-serif; }
      .num { font: 700 12px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: white; }
      .callout { font: 600 13px 'Segoe UI', 'Helvetica Neue', sans-serif; fill: #2E261F; }
      .mono { font: 600 12px 'SFMono-Regular', Consolas, monospace; fill: #4B4239; }
    </style>
  </defs>

  <rect width="1600" height="1180" fill="url(#bg)"/>
  <text x="64" y="64" class="title">Live Recording UX Concept (End-user first + hidden developer tools)</text>
  <text x="64" y="90" class="subtitle">Doel: stabiele layout zonder springende knoppen, focus op opnemen/transcriptie, debugfuncties pas zichtbaar na toggle</text>

  <!-- Desktop board -->
  <g transform="translate(60,130)">
    <rect x="0" y="0" width="1010" height="700" rx="28" fill="#E9E0D2" opacity="0.65"/>
    <rect x="18" y="18" width="974" height="664" rx="24" fill="url(#card)" filter="url(#shadow)"/>

    <text x="46" y="62" class="h2">Concept A · Focus Transcript Layout (Desktop)</text>
    <text x="46" y="86" class="subtitle">Links: vaste control card met gereserveerde statusruimte. Rechts: transcript is hoofdtaak.</text>

    <!-- Left control card -->
    <rect x="44" y="112" width="320" height="540" rx="20" fill="#FFF" stroke="#E5DACB"/>
    <text x="68" y="146" class="small">Session</text>
    <text x="68" y="174" class="h2">Interview met klant — Live</text>
    <text x="68" y="196" class="subtitle">Auto-save actief · microfoon check uitgevoerd</text>

    <!-- Stable status block -->
    <rect x="64" y="216" width="280" height="88" rx="16" fill="#F6F0E7" stroke="#E6DBCD"/>
    <rect x="80" y="232" width="104" height="28" rx="14" fill="#0F7A5C"/>
    <text x="101" y="250" class="pill" fill="#fff">LISTENING</text>
    <rect x="194" y="232" width="130" height="28" rx="14" fill="#EFE4D3"/>
    <text x="214" y="250" class="pill" fill="#5A4B3E">00:18:42</text>
    <text x="80" y="281" class="body">Opname loopt. Spreek gerust door — transcript wordt live opgebouwd.</text>
    <text x="80" y="298" class="muted">(vaste hoogte: max 2 regels + ellipsis voorkomt layout shift)</text>

    <!-- Primary controls -->
    <text x="68" y="336" class="small">Controls</text>
    <rect x="64" y="348" width="280" height="52" rx="14" fill="#B53A2D"/>
    <text x="172" y="380" class="btn" fill="#fff">Stop &amp; Save</text>

    <rect x="64" y="410" width="136" height="44" rx="12" fill="#F3EBDD" stroke="#D8C9B7"/>
    <text x="116" y="437" class="btn" fill="#3E342B">Pause</text>
    <rect x="208" y="410" width="136" height="44" rx="12" fill="#F3EBDD" stroke="#D8C9B7"/>
    <text x="251" y="437" class="btn" fill="#3E342B">Marker</text>

    <rect x="64" y="472" width="280" height="86" rx="14" fill="#FBF8F2" stroke="#E6DBCD"/>
    <text x="80" y="498" class="small">Microphone</text>
    <text x="80" y="520" class="body">EPOS / USB Mic</text>
    <text x="80" y="540" class="subtitle">Instellingen verborgen tijdens opname</text>
    <rect x="240" y="488" width="88" height="34" rx="10" fill="#EFE4D3"/>
    <text x="262" y="509" class="btn" fill="#4D4136">Change</text>

    <!-- Debug toggle collapsed -->
    <rect x="64" y="578" width="280" height="54" rx="14" fill="#FFF" stroke="#D7CBBD" stroke-dasharray="4 4"/>
    <text x="80" y="611" class="body">Developer tools</text>
    <rect x="244" y="592" width="84" height="26" rx="13" fill="#EEE5D8"/>
    <circle cx="258" cy="605" r="9" fill="#FFF" stroke="#C9BBA9"/>
    <text x="270" y="610" class="muted">Off</text>

    <!-- Transcript card -->
    <rect x="384" y="112" width="588" height="540" rx="20" fill="#FFF" stroke="#E5DACB"/>
    <text x="410" y="146" class="small">Transcript</text>
    <text x="410" y="174" class="h2">Live transcript</text>
    <text x="410" y="196" class="subtitle">Final tekst groeit door. Partials zijn apart zichtbaar en veroorzaken geen springerige editorervaring.</text>

    <!-- Partial ribbon pinned -->
    <rect x="410" y="216" width="536" height="70" rx="14" fill="#FFF7E8" stroke="#EAD9B7"/>
    <text x="428" y="238" class="small">Current phrase (partial)</text>
    <text x="428" y="264" class="body">"...and could you describe what happened after the handover meeting"</text>

    <!-- Final transcript area -->
    <rect x="410" y="300" width="536" height="298" rx="14" fill="#FBFAF7" stroke="#E8DED1"/>
    <text x="430" y="332" class="body">[00:00] Thanks for joining. Could you start by introducing yourself and your role?</text>
    <text x="430" y="366" class="body">[00:11] Sure, my name is Anna and I lead operations for the support team...</text>
    <text x="430" y="400" class="body">[00:29] Great. What changed in your workflow after the migration?</text>
    <text x="430" y="434" class="body">[00:35] The biggest change was that intake became centralized...</text>
    <text x="430" y="468" class="body">[00:52] We also started using a shared dashboard for weekly follow-up.</text>
    <rect x="430" y="548" width="156" height="28" rx="10" fill="#EFE4D3"/>
    <text x="451" y="566" class="muted">Auto-scroll: On</text>

    <!-- Footer actions -->
    <rect x="384" y="612" width="588" height="40" rx="14" fill="#F7F1E8" stroke="#E6DBCD"/>
    <text x="408" y="637" class="subtitle">Na stoppen: transcript review → “Open in editor” / “Export .txt/.srt”</text>
  </g>

  <!-- Desktop debug expanded inset -->
  <g transform="translate(1110,130)">
    <rect x="0" y="0" width="430" height="340" rx="24" fill="#FFF" stroke="#E2D7C8" filter="url(#shadow)"/>
    <text x="24" y="38" class="h2">Developer tools (expanded via toggle)</text>
    <text x="24" y="60" class="subtitle">Verborgen voor eindgebruiker; compact en los van hoofdcontrols.</text>

    <rect x="24" y="78" width="382" height="40" rx="12" fill="#F5EFE6" stroke="#E3D7C8"/>
    <text x="40" y="103" class="body">Mode</text>
    <rect x="86" y="86" width="136" height="24" rx="12" fill="#EFE4D3"/>
    <text x="110" y="102" class="mono">mock / whisperlive</text>
    <rect x="310" y="86" width="80" height="24" rx="12" fill="#B53A2D"/>
    <text x="334" y="102" class="pill" fill="#fff">Debug</text>

    <rect x="24" y="128" width="382" height="176" rx="12" fill="#1D1A17"/>
    <text x="40" y="152" class="small" fill="#D8CDBE">Event log</text>
    <text x="40" y="178" class="mono" fill="#D9D2C8">[12:03:18] Server -&gt; ready</text>
    <text x="40" y="198" class="mono" fill="#D9D2C8">[12:03:19] Client -&gt; start</text>
    <text x="40" y="218" class="mono" fill="#D9D2C8">[12:03:20] Server -&gt; partial</text>
    <text x="40" y="238" class="mono" fill="#D9D2C8">[12:03:21] Server -&gt; final</text>
    <text x="40" y="258" class="mono" fill="#D9D2C8">[12:03:22] Server -&gt; stats</text>
    <text x="40" y="286" class="muted" fill="#A89A89">Optioneel: copy logs / show raw stats / reconnect / ping</text>
  </g>

  <!-- Mobile board -->
  <g transform="translate(1110,500)">
    <text x="0" y="0" class="h2">Concept A · Mobile (meeting / interview)</text>
    <text x="0" y="22" class="subtitle">Transcript eerst. Controls sticky onderin. Debug verborgen als accordion.</text>

    <rect x="0" y="42" width="430" height="610" rx="34" fill="#151210"/>
    <rect x="12" y="54" width="406" height="586" rx="28" fill="#FBFAF7"/>
    <rect x="170" y="66" width="90" height="6" rx="3" fill="#D9D1C6"/>

    <text x="34" y="102" class="h2">Live recording</text>
    <text x="34" y="123" class="subtitle">Interview met klant</text>

    <rect x="30" y="140" width="346" height="74" rx="16" fill="#F6F0E7" stroke="#E6DBCD"/>
    <rect x="44" y="154" width="108" height="26" rx="13" fill="#0F7A5C"/>
    <text x="70" y="171" class="pill" fill="#fff">LISTENING</text>
    <rect x="160" y="154" width="92" height="26" rx="13" fill="#EFE4D3"/>
    <text x="182" y="171" class="pill" fill="#5A4B3E">18:42</text>
    <text x="44" y="197" class="body">Transcript wordt live opgebouwd</text>

    <rect x="30" y="226" width="346" height="66" rx="14" fill="#FFF7E8" stroke="#EAD9B7"/>
    <text x="46" y="246" class="small">Partial</text>
    <text x="46" y="270" class="body">"...what changed in your workflow"</text>

    <rect x="30" y="304" width="346" height="198" rx="14" fill="#FFF" stroke="#E7DCCF"/>
    <text x="46" y="336" class="body">[00:00] Thanks for joining...</text>
    <text x="46" y="366" class="body">[00:11] Sure, my name is Anna...</text>
    <text x="46" y="396" class="body">[00:29] Great. What changed...</text>
    <text x="46" y="426" class="body">[00:35] The biggest change...</text>
    <text x="46" y="470" class="muted">Scroll handmatig mogelijk · auto-scroll toggle in overflow menu</text>

    <rect x="30" y="516" width="346" height="44" rx="12" fill="#FFF" stroke="#D9CCBC" stroke-dasharray="4 4"/>
    <text x="46" y="543" class="body">Developer tools (collapsed)</text>
    <text x="326" y="543" class="muted">Show</text>

    <!-- Sticky control bar -->
    <rect x="22" y="574" width="362" height="54" rx="20" fill="#EFE6DA" stroke="#D7C9B6"/>
    <circle cx="60" cy="601" r="16" fill="#B53A2D"/>
    <rect x="96" y="588" width="86" height="28" rx="12" fill="#FFF" stroke="#D4C6B5"/>
    <text x="124" y="606" class="btn" fill="#3D332A">Pause</text>
    <rect x="192" y="588" width="80" height="28" rx="12" fill="#FFF" stroke="#D4C6B5"/>
    <text x="216" y="606" class="btn" fill="#3D332A">Mark</text>
    <rect x="282" y="584" width="88" height="34" rx="14" fill="#1F1A15"/>
    <text x="302" y="606" class="btn" fill="#FFF">Finish</text>
  </g>

  <!-- Callouts -->
  <g>
    <circle cx="102" cy="886" r="14" fill="#1F1A15"/><text x="97" y="891" class="num">1</text>
    <text x="126" y="891" class="callout">Status-regio heeft vaste hoogte + pill met vaste breedteklassen (geen verspringende knoppen)</text>

    <circle cx="102" cy="922" r="14" fill="#1F1A15"/><text x="97" y="927" class="num">2</text>
    <text x="126" y="927" class="callout">End-user controls zijn taakgericht: Start/Pause/Marker/Finish. Geen connect/ping/disconnect zichtbaar.</text>

    <circle cx="102" cy="958" r="14" fill="#1F1A15"/><text x="97" y="963" class="num">3</text>
    <text x="126" y="963" class="callout">Event log + debug knoppen zitten achter één “Developer tools” toggle (desktop card / mobile accordion).</text>

    <circle cx="102" cy="994" r="14" fill="#1F1A15"/><text x="97" y="999" class="num">4</text>
    <text x="126" y="999" class="callout">Transcript is dominant. Partial staat als aparte ribbon boven final transcript (stabieler lezen tijdens interview).</text>

    <circle cx="102" cy="1030" r="14" fill="#1F1A15"/><text x="97" y="1035" class="num">5</text>
    <text x="126" y="1035" class="callout">Mobile gebruikt sticky bottom control bar zodat transcript zichtbaar blijft tijdens opname.</text>

    <circle cx="102" cy="1066" r="14" fill="#1F1A15"/><text x="97" y="1071" class="num">6</text>
    <text x="126" y="1071" class="callout">Device-keuze en geavanceerde instellingen alleen vóór opname of via settings sheet, niet permanent in beeld.</text>
  </g>
</svg>
